{% extends 'base.html' %}
{% block content %}
<h1>Login</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button>Entra</button>
</form>
{% if user.is_authenticated %}
    Ciao {{ user.username }}|
    <a href="{% url 'logout' %}">Logout</a>
{% else %}
    <a href="{% url 'login' %}">Login</a>
{% endif %}
{% endblock %}
